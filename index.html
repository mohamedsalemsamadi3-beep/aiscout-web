<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SCOUT | Intelligent Exploration Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', system-ui, sans-serif; }
        .hero-gradient { 
            background: linear-gradient(to bottom, rgba(5,5,5,0.7), #050505), 
                        url('https://images.unsplash.com/photo-1620712943543-bcc4638d9f8e?q=80&w=2000');
            background-size: cover;
            background-position: center;
        }
        .glow-cyan { box-shadow: 0 0 20px rgba(0, 255, 242, 0.15); border: 1px solid rgba(0, 255, 242, 0.2); }
        .modal-blur { backdrop-filter: blur(15px); background: rgba(0, 0, 0, 0.9); }
        .card-gradient { background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%); }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="loader" class="fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="w-16 h-16 border-4 border-[#00fff2] border-t-transparent rounded-full animate-spin mb-4 shadow-[0_0_15px_#00fff2]"></div>
        <p class="text-[#00fff2] tracking-[0.5em] font-black animate-pulse uppercase">AI SCOUT</p>
    </div>

    <div id="article-modal" class="fixed inset-0 z-[60] hidden modal-blur p-4 md:p-10 overflow-y-auto">
        <div class="max-w-4xl mx-auto bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800 shadow-2xl relative mt-10">
            <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/50 p-2 rounded-full hover:bg-[#00fff2] hover:text-black transition-all z-10">
                <i data-lucide="x"></i>
            </button>
            <img id="modal-img" src="" class="w-full h-[400px] object-cover border-b border-zinc-800">
            
            <div class="p-8 text-left">
                <h2 id="modal-title" class="text-4xl font-black text-[#00fff2] mb-6 tracking-tighter"></h2>
                
                <div class="bg-black/60 p-6 rounded-2xl mb-8 border border-[#00fff2]/20 flex items-center gap-5">
                    <button id="play-pause-btn" onclick="toggleAudio()" class="bg-[#00fff2] text-black w-14 h-14 rounded-full flex items-center justify-center hover:scale-110 transition-transform">
                        <i id="play-icon" data-lucide="play" class="fill-current w-6 h-6"></i>
                    </button>
                    <div class="flex-1">
                        <div class="flex justify-between text-[10px] font-mono text-zinc-500 mb-2 uppercase tracking-widest">
                            <span id="current-time">0:00</span>
                            <span id="duration">0:00</span>
                        </div>
                        <input id="seek-slider" type="range" value="0" class="w-full h-1 bg-zinc-800 rounded-lg appearance-none cursor-pointer accent-[#00fff2]">
                        <audio id="main-audio" src=""></audio>
                    </div>
                </div>

                <div id="modal-content" class="border-t border-zinc-800 pt-6"></div>
            </div>
        </div>
    </div>

    <header class="p-6 sticky top-0 bg-black/60 backdrop-blur-lg border-b border-white/5 z-40">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i data-lucide="scan-eye" class="text-[#00fff2] w-8 h-8"></i>
                <span class="text-2xl font-black tracking-tighter uppercase">AI<span class="text-[#00fff2]">SCOUT</span></span>
            </div>
            <nav class="hidden md:flex gap-10 text-xs font-bold text-zinc-400 uppercase tracking-[0.2em]">
                <a href="#" class="hover:text-[#00fff2] transition-colors">Intelligence</a>
                <a href="#articles" class="hover:text-[#00fff2] transition-colors">Archive</a>
            </nav>
        </div>
    </header>

    <section class="relative min-h-[80vh] flex items-center justify-center text-center p-6 hero-gradient">
        <div class="max-w-4xl">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-[#00fff2]/10 border border-[#00fff2]/20 text-[#00fff2] text-[10px] font-bold uppercase tracking-widest mb-8">
                <span class="w-2 h-2 bg-[#00fff2] rounded-full animate-ping"></span>
                System Live: v2.0.4
            </div>
            <h1 class="text-6xl md:text-8xl font-black mb-8 leading-[0.9] uppercase tracking-tighter">Beyond <br><span class="text-[#00fff2]">Human</span> Limits</h1>
            <p class="text-zinc-400 text-lg md:text-xl max-w-2xl mx-auto mb-10 font-light italic">"The best way to predict the future is to create it through data."</p>
            <div class="flex justify-center gap-6">
                <a href="#articles" class="bg-[#00fff2] text-black px-10 py-4 rounded-full font-black uppercase text-sm hover:shadow-[0_0_30px_rgba(0,255,242,0.4)] transition-all">Explore News</a>
            </div>
        </div>
    </section>

    <section id="articles" class="py-24 px-6 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="articles-grid">
            </div>
    </section>

    <footer class="py-20 border-t border-zinc-900 text-center">
        <p class="text-zinc-700 text-[10px] font-bold uppercase tracking-[0.5em]">AI SCOUT • Neural Network Content Platform</p>
    </footer>

    <script>
        lucide.createIcons();

        // --- DATABASE: UPDATED WITH COMPLETE REPORT 01 CONTENT & PODCAST FILES ---
        const articles = [
            {
                id: 'sovereign-foundation',
                title: 'REPORT 01: THE SOVEREIGN FOUNDATION',
                category: 'System Architecture',
                image: 'https://images.unsplash.com/photo-1558494949-ef010cbdcc51?q=80&w=2000',
                description: `
                    <div class="space-y-5 text-zinc-300 font-light leading-relaxed">
                        <div class="border-b border-zinc-800 pb-4">
                            <p class="text-[#00fff2] font-mono text-xs tracking-widest uppercase mb-1">(System Architecture & Core Integrity)</p>
                            <p class="text-xs font-mono text-zinc-400">Status: <span class="text-white font-bold">Operational / Fortified</span> | Level: <span class="text-[#00fff2] font-bold">Sovereign</span></p>
                            <p class="text-xs font-mono text-zinc-400 mt-1">Objective: <span class="text-white font-bold">Structural Integrity.</span></p>
                        </div>

                        <div>
                            <h3 class="text-xl font-bold text-white mb-2">1. The Structural Audit: "The Fragility Felony"</h3>
                            <p class="mb-3">Most digital architectures are built on "Technical Sand." Relying on fragmented, disconnected AI tools creates a "Security Vacuum" and massive "Data Leakage."</p>
                            <p class="mb-3">A castle without a unified blueprint is not a fortress; it is a target. The first felony in digital scaling is the lack of a centralized command structure.</p>
                        </div>

                        <div>
                            <h3 class="text-xl font-bold text-white mb-2">2. The Command Protocol: "The Sovereign Gatekeeper"</h3>
                            <p class="mb-3">In the AI SCOUT ecosystem, we do not recognize "Tools"; we recognize "Functional Units." Report 01 establishes the Master Workflow Integration. This is the "Nervous System" of your fortress.</p>
                            <p class="mb-4">Every data pulse, from lead generation to final delivery, must be routed through a verified, encrypted, and automated sequence.</p>
                            
                            <blockquote class="border-l-2 border-[#00fff2] pl-4 py-3 bg-black/30 rounded-r-xl italic text-zinc-400 text-sm">
                                "To transition from theoretical foundation to architectural engineering, the following schematic represents the 'Nervous System' of the AI SCOUT fortress. This activation of the Sovereign Gatekeeper Protocol links all functional units into an automated path, ensuring absolute system integrity and eliminating the 'Fragility Felony' forever.”
                            </blockquote>
                        </div>

                        <div>
                            <h3 class="text-xl font-bold text-white mb-2">3. The Defensive Strategy: "Zero-Latency Execution"</h3>
                            <p class="mb-3">By automating the foundational layers, we eliminate human error—the weakest link in any perimeter. We transform the "Chaos of Choice" into a "Hierarchy of Execution." Your system no longer "responds"; it "anticipates."</p>
                        </div>

                        <div>
                            <h3 class="text-xl font-bold text-white mb-2">4. The ROI Verdict: "Architectural Supremacy"</h3>
                            <p class="mb-3">Structural integrity is the primary driver of market velocity. By fortifying the foundation, we reduce operational drag by 60%, ensuring that every subsequent report (02 through 21) sits on an inviolable bedrock of automated power.</p>
                        </div>
                    </div>
                `,
                audio: 'podcast1.mp3'
            },
            {
                id: 'report-02',
                title: 'REPORT 02: STRATEGIC SCALING',
                category: 'Growth Protocol',
                image: 'https://images.unsplash.com/photo-1507413245164-6160d8298b31?q=80&w=2000',
                description: `
                    <div class="space-y-4 text-zinc-300 font-light leading-relaxed">
                        <h3 class="text-xl font-bold text-white">Scaling Without Fragility</h3>
                        <p>In this report, we explore how to expand the AI SCOUT network without compromising the structural integrity established in Report 01.</p>
                        <p>Focusing on zero-latency execution and the removal of the human error link.</p>
                    </div>
                `,
                audio: 'Podcast2.mp3'
            }
        ];

        // RENDER CARDS
        const grid = document.getElementById('articles-grid');
        articles.forEach(art => {
            grid.innerHTML += `
                <div onclick="openModal('${art.id}')" class="group relative h-[450px] rounded-[40px] overflow-hidden cursor-pointer glow-cyan transition-all hover:-translate-y-2">
                    <img src="${art.image}" class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000">
                    <div class="absolute inset-0 card-gradient"></div>
                    <div class="absolute bottom-0 p-8 w-full">
                        <span class="bg-[#00fff2] text-black text-[10px] font-black px-3 py-1 rounded-full uppercase mb-4 inline-block">${art.category}</span>
                        <h3 class="text-2xl font-bold leading-tight group-hover:text-[#00fff2] transition-colors">${art.title}</h3>
                        <p class="text-zinc-400 text-sm mt-2 line-clamp-2 font-light">Click to read article & listen to podcast</p>
                    </div>
                </div>
            `;
        });

        // AUDIO PLAYER LOGIC
        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-pause-btn');
        const seekSlider = document.getElementById('seek-slider');

        function toggleAudio() {
            if (audio.paused) { audio.play(); updatePlayIcon(true); } 
            else { audio.pause(); updatePlayIcon(false); }
        }

        function updatePlayIcon(isPlaying) {
            const icon = document.getElementById('play-icon');
            icon.setAttribute('data-lucide', isPlaying ? 'pause' : 'play');
            lucide.createIcons();
        }

        audio.ontimeupdate = () => {
            const progress = (audio.currentTime / audio.duration) * 100;
            seekSlider.value = progress || 0;
            document.getElementById('current-time').innerText = formatTime(audio.currentTime);
            document.getElementById('duration').innerText = formatTime(audio.duration);
        };

        seekSlider.oninput = () => { audio.currentTime = (seekSlider.value / 100) * audio.duration; };

        function formatTime(secs) {
            const min = Math.floor(secs / 60);
            const sec = Math.floor(secs % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // MODAL LOGIC (Updated to use innerHTML for rendering rich HTML text perfectly)
        function openModal(id) {
            const art = articles.find(a => a.id === id);
            document.getElementById('modal-title').innerText = art.title;
            document.getElementById('modal-content').innerHTML = art.description;
            document.getElementById('modal-img').src = art.image;
            audio.src = art.audio;
            document.getElementById('article-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            updatePlayIcon(false);
        }

        function closeModal() {
            document.getElementById('article-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
            audio.pause();
        }

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 700);
            }, 1000);
        };
    </script>
</body>
</html>
