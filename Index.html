<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SCOUT | Intelligence Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0a0a0a; color: #ffffff; overflow-x: hidden; font-family: 'Inter', sans-serif; }
        @keyframes loading { 0% { width: 0%; } 100% { width: 100%; } }
    </style>
</head>
<body class="bg-dark min-h-screen flex flex-col">

    <div id="splash-screen" class="fixed inset-0 z-[100] bg-[#0a0a0a] flex flex-col items-center justify-center transition-opacity duration-1000">
        <div class="relative mb-8">
            <div class="absolute inset-0 scale-150 border-2 border-[#00fff2]/20 rounded-full animate-ping"></div>
            <div class="relative w-24 h-24 bg-black border-2 border-[#00fff2] flex items-center justify-center rounded-2xl shadow-[0_0_50px_rgba(0,255,242,0.3)]">
                <i data-lucide="scan-eye" class="text-[#00fff2] w-12 h-12 animate-pulse"></i>
            </div>
        </div>
        <h2 class="text-[#00fff2] font-mono text-3xl font-black tracking-[0.4em] animate-pulse uppercase">AI SCOUT</h2>
        <div class="w-64 h-1 bg-white/5 mt-6 rounded-full overflow-hidden">
            <div class="h-full bg-[#00fff2] animate-[loading_2s_ease-in-out_forwards]"></div>
        </div>
    </div>

    <header class="sticky top-0 z-20 bg-[#0a0a0a]/90 backdrop-blur-md border-b border-[#00fff2]/10 py-4 px-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="relative w-10 h-10 bg-black border border-[#00fff2]/40 rounded-xl flex items-center justify-center shadow-[0_0_15px_rgba(0,255,242,0.2)]">
                <i data-lucide="scan-eye" class="text-[#00fff2] w-5 h-5 animate-pulse"></i>
                <div class="absolute inset-0 bg-[#00fff2]/20 rounded-xl animate-ping opacity-30"></div>
            </div>
            <div class="text-left">
                <div class="font-black text-white text-sm tracking-widest font-mono leading-none uppercase">AI<span class="text-[#00fff2]">SCOUT</span></div>
                <div class="text-[7px] text-[#00fff2]/60 font-mono tracking-widest uppercase mt-1">NODE_ACTIVE_V3</div>
            </div>
        </div>
        <div class="flex items-center gap-2 bg-[#00fff2]/5 border border-[#00fff2]/10 px-3 py-1 rounded-full">
            <div class="w-1.5 h-1.5 rounded-full bg-[#00fff2] animate-pulse"></div>
            <span class="text-[8px] font-mono text-[#00fff2] tracking-widest uppercase">SECURE</span>
        </div>
    </header>

    <main id="main-content" class="flex-1 p-6 md:p-10 max-w-6xl mx-auto w-full opacity-0 transition-opacity duration-1000">
        <div class="flex items-center gap-4 mb-12">
            <h2 class="text-xl font-bold tracking-[0.3em] text-zinc-100 uppercase font-mono">Intelligence Feed</h2>
            <div class="flex-1 h-px bg-gradient-to-l from-[#00fff2]/30 to-transparent"></div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-[#15181e] p-8 rounded-3xl border border-white/5 hover:border-[#00fff2]/30 transition-all cursor-pointer group">
                <h3 class="text-white font-bold text-2xl mb-4 group-hover:text-[#00fff2] transition-colors uppercase">System Initialized</h3>
                <p class="text-zinc-400 text-sm leading-relaxed" dir="rtl">تم تفعيل الموقع بنجاح. ستظهر واجهة الدخول والشعار النابض الآن عند كل زيارة.</p>
            </div>
        </div>
    </main>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('opacity-0');
                document.getElementById('main-content').classList.replace('opacity-0', 'opacity-100');
                setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 1000);
            }, 2500);
            lucide.createIcons();
        });
    </script>
</body>
</html>
